<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Cliente</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#F7F9FC;color:#1A2B3C;min-height:100vh}

/* ===== TOKENS ===== */
:root{
  --navy:#0F2540;
  --navy-light:#1A3658;
  --blue:#185FA5;
  --blue-soft:#E8F1FB;
  --green:#0B7B45;
  --green-soft:#E2F5EC;
  --amber:#B45309;
  --amber-soft:#FEF3C7;
  --red:#C0392B;
  --red-soft:#FDECEA;
  --gray:#64748B;
  --border:#E2E8F0;
  --white:#FFFFFF;
  --radius:10px;
  --shadow:0 1px 4px rgba(15,37,64,0.08);
  --shadow-md:0 4px 16px rgba(15,37,64,0.12);
}

/* ===== LOGIN ===== */
#tela-login{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  background:linear-gradient(135deg,#0F2540 0%,#1A3A6A 100%);
}
.login-card{
  background:var(--white);border-radius:16px;padding:40px;
  width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.login-logo{
  display:flex;align-items:center;gap:12px;margin-bottom:32px;
}
.login-logo-mark{
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,#378ADD,#0F2540);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:18px;color:white;flex-shrink:0;
}
.login-logo-text{font-size:15px;font-weight:600;color:var(--navy);line-height:1.3}
.login-logo-sub{font-size:11px;color:var(--gray);font-weight:400}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px}
.login-sub{font-size:13.5px;color:var(--gray);margin-bottom:28px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase}
.form-input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;font-family:inherit;color:var(--navy);background:var(--white);
  transition:border-color 0.15s;outline:none;
}
.form-input:focus{border-color:var(--blue)}
.form-group{margin-bottom:18px}
.btn-login{
  width:100%;padding:13px;background:var(--navy);color:white;border:none;
  border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:background 0.15s;margin-top:4px;
}
.btn-login:hover{background:var(--navy-light)}
.btn-login:disabled{opacity:0.6;cursor:not-allowed}
.login-error{
  background:var(--red-soft);color:var(--red);border-radius:8px;
  padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;
}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh}
.topbar{
  background:var(--navy);color:white;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-mark{
  width:32px;height:32px;border-radius:7px;
  background:linear-gradient(135deg,#378ADD,rgba(255,255,255,0.2));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:white;
}
.topbar-name{font-size:14px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-user{font-size:13px;color:rgba(255,255,255,0.75)}
.btn-sair{
  background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;padding:6px 12px;font-size:12.5px;font-family:inherit;
  cursor:pointer;transition:background 0.15s;
}
.btn-sair:hover{background:rgba(255,255,255,0.2)}

.app-body{display:flex;min-height:calc(100vh - 56px)}

/* ===== SIDEBAR ===== */
.sidebar{
  width:220px;background:var(--white);border-right:1px solid var(--border);
  padding:20px 0;flex-shrink:0;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  cursor:pointer;font-size:13.5px;color:var(--gray);transition:all 0.15s;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
  position:relative;
}
.nav-item:hover{background:var(--blue-soft);color:var(--blue)}
.nav-item.active{background:var(--blue-soft);color:var(--blue);font-weight:600}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--blue);border-radius:0 2px 2px 0;
}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{
  margin-left:auto;background:var(--red);color:white;
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;
}

/* ===== MAIN CONTENT ===== */
.main{flex:1;padding:28px;overflow-y:auto;min-width:0}
.page{display:none}
.page.active{display:block}
.page-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:20px}

/* ===== CARDS ===== */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-body{padding:20px}

/* ===== PROCESSO CARD ===== */
.processo-card{
  background:var(--white);border-radius:var(--radius);border:1px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;cursor:pointer;
  transition:box-shadow 0.15s,transform 0.1s;
}
.processo-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.processo-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;gap:12px;
}
.processo-numero{font-size:15px;font-weight:700;color:var(--navy)}
.processo-tipo{font-size:12px;color:var(--gray);margin-top:2px}
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;
  flex-shrink:0;
}
.status-ativo{background:var(--green-soft);color:var(--green)}
.status-encerrado{background:#F1F5F9;color:var(--gray)}
.status-suspenso{background:var(--amber-soft);color:var(--amber)}
.processo-card-body{padding:0 18px 16px;border-top:1px solid var(--border);padding-top:12px}
.processo-meta{display:flex;flex-wrap:wrap;gap:16px}
.meta-item{font-size:12px;color:var(--gray)}
.meta-item strong{color:var(--navy);font-weight:600}

/* ===== ANDAMENTOS ===== */
.timeline{padding-left:20px;position:relative}
.timeline::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:18px;padding-left:22px}
.timeline-item::before{
  content:'';position:absolute;left:-15px;top:4px;
  width:10px;height:10px;border-radius:50%;
  background:var(--blue);border:2px solid var(--white);
  box-shadow:0 0 0 2px var(--blue);
}
.timeline-data{font-size:11px;color:var(--gray);margin-bottom:3px}
.timeline-texto{font-size:13.5px;color:var(--navy);line-height:1.5}

/* ===== DOCUMENTOS ===== */
.doc-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border:1px solid var(--border);border-radius:8px;margin-bottom:8px;
  transition:background 0.15s;
}
.doc-item:hover{background:var(--blue-soft)}
.doc-icon{font-size:22px;flex-shrink:0}
.doc-nome{font-size:13.5px;font-weight:500;color:var(--navy)}
.doc-meta{font-size:11.5px;color:var(--gray);margin-top:2px}
.doc-baixar{
  margin-left:auto;background:none;border:1px solid var(--border);
  color:var(--blue);border-radius:6px;padding:5px 12px;font-size:12px;
  cursor:pointer;font-family:inherit;transition:all 0.15s;flex-shrink:0;
}
.doc-baixar:hover{background:var(--blue);color:white;border-color:var(--blue)}

/* ===== FINANCEIRO ===== */
.parcela-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:8px;gap:12px;flex-wrap:wrap;
}
.parcela-valor{font-size:16px;font-weight:700;color:var(--navy)}
.parcela-desc{font-size:12.5px;color:var(--gray);margin-top:2px}
.parcela-status-pago{background:var(--green-soft);color:var(--green);padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.parcela-status-pendente{background:var(--amber-soft);color:var(--amber);padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.parcela-status-atrasado{background:var(--red-soft);color:var(--red);padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.parcela-status-cancelado{background:#F1F5F9;color:var(--gray);padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.resumo-financeiro{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;margin-bottom:20px;
}
.resumo-item{
  background:var(--white);border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;text-align:center;
}
.resumo-valor{font-size:20px;font-weight:700;color:var(--navy)}
.resumo-label{font-size:11px;color:var(--gray);margin-top:3px;text-transform:uppercase;letter-spacing:0.3px}

/* ===== MENSAGENS ===== */
.chat-container{
  display:flex;flex-direction:column;height:calc(100vh - 200px);
  min-height:400px;max-height:680px;
}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-bubble{max-width:72%;padding:10px 14px;border-radius:12px;font-size:13.5px;line-height:1.5}
.chat-bubble.eu{
  background:var(--blue);color:white;align-self:flex-end;
  border-bottom-right-radius:3px;
}
.chat-bubble.escritorio{
  background:var(--white);color:var(--navy);align-self:flex-start;
  border:1px solid var(--border);border-bottom-left-radius:3px;
}
.chat-meta{font-size:10.5px;opacity:0.7;margin-top:4px}
.chat-input-area{
  display:flex;gap:10px;padding:14px;border-top:1px solid var(--border);
  background:var(--white);border-radius:0 0 var(--radius) var(--radius);
}
.chat-input{
  flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13.5px;font-family:inherit;resize:none;outline:none;
  max-height:100px;min-height:42px;
}
.chat-input:focus{border-color:var(--blue)}
.btn-enviar{
  background:var(--blue);color:white;border:none;border-radius:8px;
  padding:10px 18px;font-size:13.5px;font-family:inherit;cursor:pointer;
  transition:background 0.15s;align-self:flex-end;
}
.btn-enviar:hover{background:var(--navy)}
.btn-enviar:disabled{opacity:0.5;cursor:not-allowed}

/* ===== PROCESSO SELETOR ===== */
.processo-select{
  margin-bottom:14px;
}
.processo-select select{
  padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;color:var(--navy);background:white;
  outline:none;max-width:340px;width:100%;
}
.processo-select select:focus{border-color:var(--blue)}

/* ===== EMPTY STATES ===== */
.empty{text-align:center;padding:48px 20px;color:var(--gray)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* ===== LOADING ===== */
.loading{text-align:center;padding:40px;color:var(--gray);font-size:13.5px}

/* ===== MOBILE ===== */
@media(max-width:640px){
  .sidebar{display:none}
  .main{padding:16px}
  .topbar{padding:0 16px}
  .chat-container{height:calc(100vh - 180px)}
  .nav-mobile{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--white);border-top:1px solid var(--border);
    z-index:100;
  }
  .nav-mobile-item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:10px 4px 14px;font-size:10px;color:var(--gray);
    border:none;background:none;cursor:pointer;font-family:inherit;gap:3px;
  }
  .nav-mobile-item.active{color:var(--blue)}
  .nav-mobile-icon{font-size:20px}
  .app-body{padding-bottom:70px}
  .resumo-financeiro{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:641px){.nav-mobile{display:none}}
</style>
</head>
<body>

<!-- ===== TELA DE LOGIN ===== -->
<div id="tela-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark" id="login-mark">A</div>
      <div>
        <div class="login-logo-text" id="login-escritorio-nome">Carregando...</div>
        <div class="login-logo-sub">Portal do Cliente</div>
      </div>
    </div>
    <div class="login-title">Acompanhe seu processo</div>
    <div class="login-sub">Entre com as credenciais enviadas pelo escritório.</div>
    <div class="login-error" id="login-erro">E-mail ou senha incorretos.</div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-mark" id="top-mark">A</div>
      <div class="topbar-name" id="top-escritorio">Escritório</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user" id="top-cliente">Olá, cliente</div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="app-body">
    <!-- Sidebar desktop -->
    <nav class="sidebar">
      <button class="nav-item active" onclick="navegar('processos',this)">
        <span class="nav-icon">⚖️</span> Meus Processos
      </button>
      <button class="nav-item" onclick="navegar('documentos',this)">
        <span class="nav-icon">📂</span> Documentos
      </button>
      <button class="nav-item" onclick="navegar('financeiro',this)">
        <span class="nav-icon">💰</span> Financeiro
      </button>
      <button class="nav-item" onclick="navegar('mensagens',this)">
        <span class="nav-icon">💬</span> Mensagens
        <span class="nav-badge" id="badge-msg" style="display:none">0</span>
      </button>
    </nav>

    <!-- Conteúdo principal -->
    <main class="main">
      <!-- PROCESSOS -->
      <div class="page active" id="page-processos">
        <div class="page-title">Meus Processos</div>
        <div id="processos-lista"><div class="loading">Carregando...</div></div>
      </div>

      <!-- DOCUMENTOS -->
      <div class="page" id="page-documentos">
        <div class="page-title">Documentos</div>
        <div class="processo-select">
          <select id="doc-select-processo" onchange="renderDocumentos()">
            <option value="">Todos os processos</option>
          </select>
        </div>
        <div id="documentos-lista"><div class="loading">Carregando...</div></div>
      </div>

      <!-- FINANCEIRO -->
      <div class="page" id="page-financeiro">
        <div class="page-title">Financeiro</div>
        <div class="resumo-financeiro" id="fin-resumo"></div>
        <div id="parcelas-lista"><div class="loading">Carregando...</div></div>
      </div>

      <!-- MENSAGENS -->
      <div class="page" id="page-mensagens">
        <div class="page-title">Mensagens</div>
        <div class="processo-select">
          <select id="msg-select-processo">
            <option value="">Mensagem geral (sem processo específico)</option>
          </select>
        </div>
        <div class="card">
          <div class="chat-container">
            <div class="chat-messages" id="chat-lista"></div>
            <div class="chat-input-area">
              <textarea class="chat-input" id="chat-input" placeholder="Escreva sua mensagem..." rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarMensagem()}"></textarea>
              <button class="btn-enviar" onclick="enviarMensagem()">Enviar</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Nav mobile -->
  <nav class="nav-mobile">
    <button class="nav-mobile-item active" onclick="navegar('processos',this)">
      <span class="nav-mobile-icon">⚖️</span>Processos
    </button>
    <button class="nav-mobile-item" onclick="navegar('documentos',this)">
      <span class="nav-mobile-icon">📂</span>Documentos
    </button>
    <button class="nav-mobile-item" onclick="navegar('financeiro',this)">
      <span class="nav-mobile-icon">💰</span>Financeiro
    </button>
    <button class="nav-mobile-item" onclick="navegar('mensagens',this)">
      <span class="nav-mobile-icon">💬</span>Mensagens
    </button>
  </nav>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO — substitua pelos valores do seu projeto
// ============================================================
const SUPABASE_URL = 'https://voufezlvxnihfazimjqe.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdWZlemx2eG5paGZhemltanFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDAwOTcsImV4cCI6MjA5NzM3NjA5N30.AWWNngX-7nK0I9ZgbcJWiC6zNY2dfsBBxC1zaqMWH7s';
// ============================================================

let sb, clienteId, escritorioId, clienteNome;
let storeProcessos = [], storeParcelas = [], storeMensagens = [];

// ---- Init ----
async function init() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Verificar sessão ativa
  const { data: { session } } = await sb.auth.getSession();
  if(session) {
    const ok = await carregarDadosCliente(session.user);
    if(ok) mostrarApp(); else mostrarLogin();
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN' && session) {
      const ok = await carregarDadosCliente(session.user);
      if(ok) mostrarApp(); else mostrarLogin();
    } else if(event === 'SIGNED_OUT') {
      mostrarLogin();
    }
  });
}

// ---- Login ----
async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const btnLogin = document.getElementById('btn-login');
  const erro = document.getElementById('login-erro');

  if(!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }

  btnLogin.disabled = true;
  btnLogin.textContent = 'Entrando...';
  erro.style.display = 'none';

  const { error } = await sb.auth.signInWithPassword({ email, password: senha });

  if(error) {
    mostrarErro('E-mail ou senha incorretos.');
    btnLogin.disabled = false;
    btnLogin.textContent = 'Entrar';
    return;
  }
}

function mostrarErro(msg) {
  const el = document.getElementById('login-erro');
  el.textContent = msg;
  el.style.display = 'block';
}

async function carregarDadosCliente(user) {
  // Buscar o registro de cliente vinculado a este usuário
  const { data: cliente, error } = await sb.from('clientes')
    .select('id, nome, escritorio_id, escritorios(nome)')
    .eq('usuario_id', user.id)
    .single();

  if(error) {
    console.error('Erro ao carregar dados do cliente:', error);
    mostrarErro('Não foi possível carregar seus dados. Recarregue a página e tente novamente.');
    return false;
  }

  if(!cliente) {
    await sb.auth.signOut();
    mostrarErro('Acesso não encontrado. Entre em contato com o escritório.');
    return false;
  }

  clienteId = cliente.id;
  escritorioId = cliente.escritorio_id;
  clienteNome = cliente.nome;

  const nomeEsc = cliente.escritorios?.nome || 'Escritório';
  const inicial = nomeEsc.charAt(0).toUpperCase();

  // Atualizar visual com dados do escritório
  document.getElementById('login-escritorio-nome').textContent = nomeEsc;
  document.getElementById('login-mark').textContent = inicial;
  document.getElementById('top-mark').textContent = inicial;
  document.getElementById('top-escritorio').textContent = nomeEsc;
  document.getElementById('top-cliente').textContent = 'Olá, ' + clienteNome.split(' ')[0];
  return true;
}

async function sair() {
  await sb.auth.signOut();
}

function mostrarApp() {
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  carregarTudo();
}

function mostrarLogin() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-login').style.display = 'flex';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Entrar';
}

// ---- Navegação ----
let paginaAtual = 'processos';
function navegar(pagina, btn) {
  document.querySelectorAll('.nav-item,.nav-mobile-item').forEach(el => el.classList.remove('active'));
  if(btn) {
    // marcar todos os botões com o mesmo data implícito pelo onclick
    document.querySelectorAll('.nav-item,.nav-mobile-item').forEach(el => {
      if(el.getAttribute('onclick') && el.getAttribute('onclick').includes("'"+pagina+"'")) el.classList.add('active');
    });
  }
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+pagina).classList.add('active');
  paginaAtual = pagina;
  if(pagina === 'mensagens') carregarMensagens();
}

// ---- Carregar dados ----
async function carregarTudo() {
  await Promise.all([carregarProcessos(), carregarParcelas()]);
  renderProcessos();
  renderDocumentos();
  renderFinanceiro();
  await carregarMensagens();
}

async function carregarProcessos() {
  const { data, error } = await sb.from('processos')
    .select('id, numero, status, tipo_id, vara, juiz, advogado_id, resultado, data_encerramento, criado_em')
    .eq('cliente_id', clienteId)
    .order('criado_em', { ascending: false });
  if(error) { console.warn(error.message); return; }
  storeProcessos = data || [];

  if(storeProcessos.length) {
    const processoIds = storeProcessos.map(p => p.id);
    const tipoIds = [...new Set(storeProcessos.map(p => p.tipo_id).filter(Boolean))];
    const hoje = new Date().toISOString().split('T')[0];

    // Busca tipo de processo, andamentos e próximos prazos/audiências à
    // parte (em vez de usar o embed automático do PostgREST, que não
    // estava reconhecendo a relação) e junta tudo aqui no JavaScript mesmo.
    const [tiposRes, andamentosRes, eventosRes] = await Promise.all([
      tipoIds.length ? sb.from('tipos_processo').select('id, nome').in('id', tipoIds) : Promise.resolve({ data: [] }),
      sb.from('andamentos').select('id, processo_id, criado_em, autor_nome, texto, status').in('processo_id', processoIds).order('criado_em', { ascending: false }),
      sb.from('eventos').select('id, processo_id, titulo, tipo, data_evento, hora').in('processo_id', processoIds).gte('data_evento', hoje).order('data_evento', { ascending: true })
    ]);

    const mapaTipos = {};
    (tiposRes.data || []).forEach(t => { mapaTipos[t.id] = t.nome; });

    const andamentosPorProcesso = {};
    (andamentosRes.data || []).forEach(a => {
      if(!andamentosPorProcesso[a.processo_id]) andamentosPorProcesso[a.processo_id] = [];
      andamentosPorProcesso[a.processo_id].push(a);
    });

    const eventosPorProcesso = {};
    (eventosRes.data || []).forEach(e => {
      if(!eventosPorProcesso[e.processo_id]) eventosPorProcesso[e.processo_id] = [];
      eventosPorProcesso[e.processo_id].push(e);
    });

    storeProcessos.forEach(p => {
      p.tipo = { nome: mapaTipos[p.tipo_id] || null };
      p.andamentos = andamentosPorProcesso[p.id] || [];
      p.proximosPrazos = eventosPorProcesso[p.id] || [];
    });
  }

  // Popular selects de processo
  const opts = storeProcessos.map(p => `<option value="${p.id}">${p.numero}</option>`).join('');
  document.getElementById('doc-select-processo').innerHTML = '<option value="">Todos os processos</option>' + opts;
  document.getElementById('msg-select-processo').innerHTML = '<option value="">Mensagem geral</option>' + opts;
}

async function carregarParcelas() {
  const { data, error } = await sb.from('parcelas')
    .select('id, numero, total_parcelas, valor, vencimento, status, processo_id, observacoes')
    .eq('cliente_id', clienteId)
    .order('vencimento');
  if(error) { console.warn('Erro ao carregar parcelas:', error); return; }
  storeParcelas = data || [];
}

async function carregarMensagens() {
  const { data, error } = await sb.from('portal_mensagens')
    .select('id, remetente, conteudo, criado_em, processo_id, lida')
    .eq('cliente_id', clienteId)
    .order('criado_em', { ascending: true });
  if(error) { console.warn('Erro ao carregar mensagens:', error); return; }
  storeMensagens = data || [];
  renderChat();
  atualizarBadgeMensagens();
  marcarMensagensComoLidas();
}

// Ao entrar na conversa, marca como lidas as mensagens do escritório que
// o cliente ainda não tinha visto — assim o badge some.
async function marcarMensagensComoLidas() {
  const naoLidas = storeMensagens.filter(m => m.remetente === 'escritorio' && !m.lida);
  if(!naoLidas.length) return;
  for(const m of naoLidas) {
    const { error } = await sb.rpc('marcar_mensagem_lida_cliente', { p_mensagem_id: m.id });
    if(!error) m.lida = true;
  }
  atualizarBadgeMensagens();
}

// ---- Render: Processos ----
const STATUS_MAP = {
  ativo: { label: 'Ativo', cls: 'status-ativo', icon: '🟢' },
  encerrado: { label: 'Encerrado', cls: 'status-encerrado', icon: '⚫' },
  suspenso: { label: 'Suspenso', cls: 'status-suspenso', icon: '🟡' },
  arquivado: { label: 'Arquivado', cls: 'status-encerrado', icon: '⚫' }
};

function renderProcessos() {
  const lista = document.getElementById('processos-lista');
  if(!storeProcessos.length) {
    lista.innerHTML = '<div class="empty"><div class="empty-icon">⚖️</div><div class="empty-text">Nenhum processo encontrado.</div></div>';
    return;
  }

  lista.innerHTML = storeProcessos.map(p => {
    const st = STATUS_MAP[p.status] || { label: p.status, cls: 'status-encerrado', icon: '⚫' };
    const tipo = p.tipo?.nome || '—';
    const andamentos = (p.andamentos||[]).slice().sort((a,b) => new Date(b.criado_em) - new Date(a.criado_em));
    const ultimoAnd = andamentos[0];
    const proximoPrazo = (p.proximosPrazos||[])[0];

    return `<div class="processo-card" onclick="abrirProcesso('${p.id}')">
      <div class="processo-card-header">
        <div>
          <div class="processo-numero">${p.numero}</div>
          <div class="processo-tipo">${tipo}</div>
        </div>
        <span class="status-pill ${st.cls}">${st.icon} ${st.label}</span>
      </div>
      <div class="processo-card-body">
        ${proximoPrazo ? `<div style="background:#FEF3C7;color:#92400E;border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:600;margin-bottom:10px">📅 ${proximoPrazo.titulo} — ${new Date(proximoPrazo.data_evento+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}${proximoPrazo.hora?' às '+proximoPrazo.hora:''}</div>` : ''}
        <div class="processo-meta">
          ${p.vara ? `<div class="meta-item"><strong>Vara:</strong> ${p.vara}</div>` : ''}
          ${ultimoAnd ? `<div class="meta-item" style="width:100%"><strong>Último andamento:</strong> ${ultimoAnd.texto?.slice(0,120)||'—'}${ultimoAnd.texto?.length>120?'…':''}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function abrirProcesso(processoId) {
  const p = storeProcessos.find(p => p.id === processoId);
  if(!p) return;

  const st = STATUS_MAP[p.status] || { label: p.status, cls: 'status-encerrado', icon: '⚫' };
  const andamentos = (p.andamentos||[]).slice().sort((a,b) => new Date(b.criado_em) - new Date(a.criado_em));
  const prazos = (p.proximosPrazos||[]).slice();
  const abertura = p.criado_em ? new Date(p.criado_em).toLocaleDateString('pt-BR') : '—';

  function infoItem(label, valor) {
    if(!valor) return '';
    return `<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray);margin-bottom:3px">${label}</div><div style="font-weight:600">${valor}</div></div>`;
  }

  const html = `<div style="margin-bottom:24px">
    <button onclick="renderProcessos();document.getElementById('page-processos').querySelector('.page-title').textContent='Meus Processos'" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:13.5px;font-family:inherit;padding:0;margin-bottom:16px">← Voltar</button>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      <div>
        <div style="font-size:22px;font-weight:700;color:var(--navy)">${p.numero}</div>
        <div style="font-size:14px;color:var(--gray)">${p.tipo?.nome||'—'}</div>
      </div>
      <span class="status-pill ${st.cls}" style="font-size:13px;padding:6px 14px">${st.icon} ${st.label}</span>
    </div>

    <div class="card" style="margin-bottom:16px"><div class="card-body"><div style="display:flex;flex-wrap:wrap;gap:20px">
      ${infoItem('Vara', p.vara)}
      ${infoItem('Juiz', p.juiz)}
      ${infoItem('Advogado Responsável', p.advogado_id)}
      ${infoItem('Data de Abertura', abertura)}
    </div></div></div>

    ${(p.resultado || p.data_encerramento) ? `<div class="card" style="margin-bottom:16px;border-left:3px solid var(--blue)"><div class="card-body">
      <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px">Resultado do Processo</div>
      <div style="display:flex;flex-wrap:wrap;gap:20px">
        ${infoItem('Resultado', p.resultado)}
        ${infoItem('Data de Encerramento', p.data_encerramento ? new Date(p.data_encerramento+'T12:00:00').toLocaleDateString('pt-BR') : null)}
      </div>
    </div></div>` : ''}

    ${prazos.length ? `<div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:12px">Próximos Prazos (${prazos.length})</div>
    <div style="margin-bottom:20px">` + prazos.map(e => {
      const data = new Date(e.data_evento+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="card" style="margin-bottom:8px"><div class="card-body" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px">
        <div><div style="font-weight:600;font-size:13.5px">${e.titulo}</div><div style="font-size:12px;color:var(--gray)">${data}${e.hora?' às '+e.hora:''}</div></div>
      </div></div>`;
    }).join('') + `</div>` : ''}

    <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:12px">Andamentos (${andamentos.length})</div>
    ${andamentos.length ? `<div class="timeline">` + andamentos.map(a => {
      const data = new Date(a.criado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="timeline-item"><div class="timeline-data">${data}</div><div class="timeline-texto">${a.texto||'—'}</div></div>`;
    }).join('') + `</div>` : '<div class="empty" style="padding:24px"><div class="empty-text">Nenhum andamento registrado ainda.</div></div>'}
  </div>`;

  document.getElementById('processos-lista').innerHTML = html;
  document.getElementById('page-processos').querySelector('.page-title').textContent = 'Detalhes do Processo';
}

// ---- Render: Documentos ----
async function renderDocumentos() {
  const lista = document.getElementById('documentos-lista');
  const processoId = document.getElementById('doc-select-processo')?.value || '';

  lista.innerHTML = '<div class="loading">Carregando...</div>';

  let query = sb.from('documentos')
    .select('id, nome_arquivo, tipo, tamanho_bytes, storage_path, criado_em, processo_id, cliente_id')
    .eq('escritorio_id', escritorioId);

  if(processoId) {
    query = query.eq('processo_id', processoId);
  } else {
    // Cliente vê documentos vinculados a ele ou a seus processos
    const ids = storeProcessos.map(p => p.id);
    if(ids.length) {
      query = query.or(`cliente_id.eq.${clienteId},processo_id.in.(${ids.join(',')})`);
    } else {
      query = query.eq('cliente_id', clienteId);
    }
  }

  const { data, error } = await query.order('criado_em', { ascending: false });
  if(error || !data?.length) {
    lista.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Nenhum documento disponível.</div></div>';
    return;
  }

  lista.innerHTML = await Promise.all(data.map(async doc => {
    const proc = storeProcessos.find(p => p.id === doc.processo_id);
    const data_fmt = new Date(doc.criado_em).toLocaleDateString('pt-BR');
    const tamanho = doc.tamanho_bytes ? (doc.tamanho_bytes > 1024*1024 ? (doc.tamanho_bytes/1024/1024).toFixed(1)+' MB' : Math.round(doc.tamanho_bytes/1024)+' KB') : '';
    const ext = (doc.nome_arquivo||'').split('.').pop().toLowerCase();
    // Gerar URL assinada via Storage
    let urlDownload = '';
    if(doc.storage_path) {
      const { data: signed } = await sb.storage.from('documentos').createSignedUrl(doc.storage_path, 300);
      urlDownload = signed?.signedUrl || '';
    }
    const doc_nome = doc.nome_arquivo || 'Documento';
    const icone = {pdf:'📄',doc:'📝',docx:'📝',jpg:'🖼',jpeg:'🖼',png:'🖼'}[ext] || '📎';
    return `<div class="doc-item">
      <div class="doc-icon">${icone}</div>
      <div>
        <div class="doc-nome">${doc_nome}</div>
        <div class="doc-meta">${proc?proc.numero+' · ':''}${data_fmt}${tamanho?' · '+tamanho:''}</div>
      </div>
      ${urlDownload ? `<button class="doc-baixar" onclick="window.open('${urlDownload}','_blank')">⬇ Baixar</button>` : ''}
    </div>`;
  })).then(htmls => htmls.join(''));
}

// ---- Render: Financeiro ----
function renderFinanceiro() {
  const total = storeParcelas.reduce((s,p) => s + (p.valor||0), 0);
  const pagas = storeParcelas.filter(p => p.status === 'pago');
  const pendentes = storeParcelas.filter(p => p.status === 'pendente' && new Date(p.vencimento) >= new Date());
  const atrasadas = storeParcelas.filter(p => p.status === 'pendente' && new Date(p.vencimento) < new Date());

  const fmtMoney = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});

  document.getElementById('fin-resumo').innerHTML = `
    <div class="resumo-item"><div class="resumo-valor">${storeParcelas.length}</div><div class="resumo-label">Total Parcelas</div></div>
    <div class="resumo-item"><div class="resumo-valor" style="color:var(--green)">${pagas.length}</div><div class="resumo-label">Pagas</div></div>
    <div class="resumo-item"><div class="resumo-valor" style="color:var(--amber)">${pendentes.length}</div><div class="resumo-label">Pendentes</div></div>
    <div class="resumo-item"><div class="resumo-valor" style="color:var(--red)">${atrasadas.length}</div><div class="resumo-label">Atrasadas</div></div>
  `;

  if(!storeParcelas.length) {
    document.getElementById('parcelas-lista').innerHTML = '<div class="empty"><div class="empty-icon">💰</div><div class="empty-text">Nenhuma parcela encontrada.</div></div>';
    return;
  }

  document.getElementById('parcelas-lista').innerHTML = storeParcelas.map(p => {
    const venc = new Date(p.vencimento+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
    const pago = p.status === 'pago';
    const cancelado = p.status === 'cancelado';
    const atrasado = p.status === 'pendente' && new Date(p.vencimento) < new Date();
    const stCls = pago ? 'parcela-status-pago' : cancelado ? 'parcela-status-cancelado' : (atrasado ? 'parcela-status-atrasado' : 'parcela-status-pendente');
    const stLabel = pago ? '✅ Pago' : cancelado ? '❌ Cancelado' : (atrasado ? '⚠️ Atrasado' : '⏳ Pendente');
    const proc = storeProcessos.find(pr => pr.id === p.processo_id);
    const desc = p.observacoes || ('Parcela ' + p.numero + ' de ' + p.total_parcelas);
    return `<div class="parcela-item">
      <div>
        <div class="parcela-valor">${fmtMoney(p.valor)}</div>
        <div class="parcela-desc">${desc}${proc?' · '+proc.numero:''} · Venc. ${venc}</div>
      </div>
      <span class="${stCls}">${stLabel}</span>
    </div>`;
  }).join('');
}

// ---- Mensagens ----
function renderChat() {
  const lista = document.getElementById('chat-lista');
  if(!storeMensagens.length) {
    lista.innerHTML = '<div class="empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><div class="empty-icon">💬</div><div class="empty-text">Nenhuma mensagem ainda.<br>Envie uma mensagem para o escritório.</div></div>';
    return;
  }
  lista.innerHTML = storeMensagens.map(m => {
    const eu = m.remetente === 'cliente';
    const hora = new Date(m.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    const proc = m.processo_id ? storeProcessos.find(p => p.id === m.processo_id) : null;
    return `<div style="display:flex;flex-direction:column;align-items:${eu?'flex-end':'flex-start'}">
      ${proc ? `<div style="font-size:10.5px;color:var(--gray);margin-bottom:2px;padding:0 4px">⚖️ ${proc.numero}</div>` : ''}
      <div class="chat-bubble ${eu?'eu':'escritorio'}">
        ${m.conteudo}
        <div class="chat-meta">${hora}</div>
      </div>
    </div>`;
  }).join('');
  lista.scrollTop = lista.scrollHeight;
}

function atualizarBadgeMensagens() {
  const naoLidas = storeMensagens.filter(m => m.remetente === 'escritorio' && !m.lida).length;
  const badge = document.getElementById('badge-msg');
  if(badge) { badge.textContent = naoLidas; badge.style.display = naoLidas ? '' : 'none'; }
}

async function enviarMensagem() {
  const input = document.getElementById('chat-input');
  const conteudo = input.value.trim();
  if(!conteudo) return;

  const processoId = document.getElementById('msg-select-processo').value || null;
  const btn = document.querySelector('.btn-enviar');

  if(!clienteId || !escritorioId) {
    alert('Sua sessão expirou. A página vai recarregar.');
    location.reload();
    return;
  }

  btn.disabled = true;

  const { data, error } = await sb.from('portal_mensagens').insert({
    escritorio_id: escritorioId, cliente_id: clienteId,
    processo_id: processoId, remetente: 'cliente', conteudo
  }).select().single();

  if(error) {
    console.error('Erro ao enviar mensagem:', error);
    alert('Erro ao enviar mensagem:\n' + (error.message || '') + (error.hint ? '\nDica: ' + error.hint : '') + (error.code ? '\nCódigo: ' + error.code : ''));
    btn.disabled = false;
    return;
  }

  input.value = '';
  storeMensagens.push({ ...data });
  renderChat();
  btn.disabled = false;
}

// ---- Boot ----
init();

// Mesma correção de causa raiz aplicada no ERP: revalida a sessão do
// Supabase Auth sempre que a aba do portal volta a ficar visível, evitando
// erros confusos de RLS por token expirado em segundo plano.
document.addEventListener('visibilitychange', async () => {
  if(document.visibilityState === 'visible' && sb) {
    await sb.auth.getSession();
  }
});
</script>
